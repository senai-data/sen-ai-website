services:
  nginx:
    image: nginx:alpine
    container_name: senai-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Certbot webroot for Let's Encrypt http-01 renewals (cert lapse fix 2026-06).
      - /var/www/certbot:/var/www/certbot:ro
      # Whole reports tree mounted RO so symlinks in _serve/ can resolve their targets.
      # Nginx alias only exposes _serve/ — the {client}/{period}/ folders are not browsable.
      - /opt/sen-ai/reports:/var/www/reports:ro
    depends_on:
      - api
      - astro
    restart: unless-stopped

  astro:
    build:
      context: .
      dockerfile: Dockerfile.astro
    container_name: senai-astro
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: senai-api
    env_file: ./api/.env
    volumes:
      # API needs RW access to publish/unpublish report files + symlinks.
      - /opt/sen-ai/reports:/opt/sen-ai/reports
      # Phase NW.1 - shared natural_writing service (read-only bind mount).
      # Single source of truth used by api (chatbot upcoming) + worker handlers.
      - ./shared:/app/shared:ro
      # Anti-AI rule cache shared between api + worker so GitHub + Wikipedia
      # fetches happen once (7-day TTL). Survives container rebuilds.
      - nw_cache:/app/cache/natural_writing
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Scan-pipeline worker — handles every job EXCEPT content generation
  # (article/FAQ). Stays single-threaded so we don't introduce cross-job
  # races inside the same scan_id. Pipeline jobs are seconds-fast each,
  # so serial is fine here.
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: senai-worker
    # T5 (robustesse worker): on `docker stop`/deploy, SIGTERM triggers the
    # graceful handler which re-pends the in-flight job (a single UPDATE, <1s)
    # then os._exit - we do NOT wait for the 30-60min job to finish. This grace
    # window is only headroom for that UPDATE to commit under DB load; the
    # container exits as soon as the re-pend lands.
    stop_grace_period: 30s
    env_file: ./worker/.env
    environment:
      WORKER_ID: worker-scan
      # Tranche 2 (project_worker_queue_scaling): discover_media_catalog +
      # measure_publish_outcome are background sweeps routed to senai-worker-maint
      # so they can NEVER occupy the scan pipeline. Priority (migration 063)
      # only reorders PENDING jobs - a sweep already 'running' would still hog
      # this single-threaded worker, so we exclude them from its poll entirely.
      WORKER_JOB_TYPES_EXCLUDE: generate_article,generate_faq,discover_media_catalog,measure_publish_outcome
    volumes:
      - ./shared:/app/shared:ro
      - nw_cache:/app/cache/natural_writing
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Content-gen worker — only `generate_article` (5-15 min) and `generate_faq`
  # (~60 sec). Lives in its own process so a long article gen no longer
  # head-of-line-blocks the scan pipeline. Per-item dedup in the API
  # (content_items.py generate_content) means two workers can't grab the
  # same item, so this is safe to scale to N replicas later if needed.
  worker-content:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: senai-worker-content
    stop_grace_period: 30s  # T5: graceful SIGTERM re-pend (see senai-worker)
    env_file: ./worker/.env
    environment:
      WORKER_ID: worker-content
      # Phase MR.2 : suggest_media (~2-3s, user-facing modal) added so it
      # doesn't sit behind a 30-60min run_llm_tests on senai-worker.
      # FOR UPDATE SKIP LOCKED in poll_and_execute prevents double-pickup.
      # Placements : match_placements (~2s, user-facing after paste) same
      # reason - senai-worker also picks it up, both race safely.
      WORKER_JOB_TYPES_INCLUDE: generate_article,generate_faq,suggest_media,match_placements
    volumes:
      - ./shared:/app/shared:ro
      - nw_cache:/app/cache/natural_writing
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Maintenance worker — background sweeps that must never occupy the scan
  # pipeline (Tranche 2, project_worker_queue_scaling 2026-07-21).
  # discover_media_catalog is Babbar-rate-limited (52s pauses) and was the
  # head-of-line blocker on senai-worker ; measure_publish_outcome is a T+14
  # background sweep with nobody waiting. NOT routed onto worker-content, whose
  # suggest_media / match_placements are user-facing and would then block
  # behind a Babbar sweep. Every worker's loop still ENQUEUES these sweeps
  # (dedup is DB-based, so enqueuer != processor is safe) but only this
  # container picks them up. Single-threaded, mostly idle (24h / 1h cadence).
  worker-maint:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: senai-worker-maint
    stop_grace_period: 30s  # T5: graceful SIGTERM re-pend (see senai-worker)
    env_file: ./worker/.env
    environment:
      WORKER_ID: worker-maint
      WORKER_JOB_TYPES_INCLUDE: discover_media_catalog,measure_publish_outcome
    volumes:
      - ./shared:/app/shared:ro
      - nw_cache:/app/cache/natural_writing
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: senai-postgres
    environment:
      POSTGRES_DB: senai
      POSTGRES_USER: senai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-senai-change-in-prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U senai"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  nw_cache:
