services:
  nginx:
    image: nginx:alpine
    container_name: senai-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Whole reports tree mounted RO so symlinks in _serve/ can resolve their targets.
      # Nginx alias only exposes _serve/ — the {client}/{period}/ folders are not browsable.
      - /opt/sen-ai/reports:/var/www/reports:ro
    depends_on:
      - api
      - astro
    restart: unless-stopped

  astro:
    build:
      context: .
      dockerfile: Dockerfile.astro
    container_name: senai-astro
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: senai-api
    env_file: ./api/.env
    volumes:
      # API needs RW access to publish/unpublish report files + symlinks.
      - /opt/sen-ai/reports:/opt/sen-ai/reports
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: senai-worker
    env_file: ./worker/.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: senai-postgres
    environment:
      POSTGRES_DB: senai
      POSTGRES_USER: senai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-senai-change-in-prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U senai"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
