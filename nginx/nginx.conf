events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ---------- Cache policy for HTML (2026-07-18, pre-launch) ----------
    # Every HTML response left the origin with max-age=0, so every single
    # visitor hit this 2-core VPS - which also runs the API and two workers.
    # A traffic spike (HN / press) would degrade the app for signed-in users.
    #
    # STRICT ALLOWLIST : only prerendered marketing pages are cacheable.
    # Everything else - the app, auth flows, invite/verify/reset links, the
    # private /r/ reports - must stay no-store. Adding a path here means
    # asserting it renders identically for an anonymous visitor.
    #
    # s-maxage targets the CDN, max-age the browser, stale-while-revalidate
    # lets the edge serve a slightly stale page while it refetches (a spike
    # then costs one origin hit per page per 10 minutes).
    # NOTE : Cloudflare does NOT cache HTML by default even with these
    # headers - a Cache Rule ("eligible for cache" on these paths) must be
    # enabled in the dashboard. Cf docs/launch_hn_ai_crawlers_draft.md.
    map $uri $senai_cache_control {
        default                                                            "private, no-store";
        "~^/$"                                                             "public, max-age=60, s-maxage=600, stale-while-revalidate=86400";
        "~^/(guides|ressources)(/|$)"                                      "public, max-age=60, s-maxage=600, stale-while-revalidate=86400";
        "~^/(pricing|agency|privacy|terms|mentions-legales|methodology)/?$" "public, max-age=60, s-maxage=600, stale-while-revalidate=86400";
        "~^/fr/methodology/?$"                                             "public, max-age=60, s-maxage=600, stale-while-revalidate=86400";
    }
    # ---------- /Cache policy ----------

    # ---------- Real visitor IP behind the Cloudflare proxy ----------
    # When orange-clouded, $remote_addr is a Cloudflare edge IP. Without this,
    # X-Real-IP / X-Forwarded-For sent to the API are CF IPs -> slowapi rate
    # limiting buckets everyone together and the audit log records the wrong IP.
    # We only trust CF-Connecting-IP from Cloudflare's published ranges
    # (https://www.cloudflare.com/ips/); spoofed headers from elsewhere are ignored.
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;
    # ---------- /Real visitor IP ----------

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name sen-ai.fr www.sen-ai.fr;

        # Let's Encrypt http-01 challenge (certbot webroot mode).
        # The redirect lives in location / (NOT server-level return: that runs
        # in the server rewrite phase, before location matching, and would
        # short-circuit the challenge) or renewals fail and the cert lapses.
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://sen-ai.fr$request_uri;
        }
    }

    # www → non-www redirect
    server {
        listen 443 ssl;
        server_name www.sen-ai.fr;

        ssl_certificate /etc/letsencrypt/live/sen-ai.fr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sen-ai.fr/privkey.pem;

        return 301 https://sen-ai.fr$request_uri;
    }

    # Main server
    server {
        listen 443 ssl;
        server_name sen-ai.fr;

        ssl_certificate /etc/letsencrypt/live/sen-ai.fr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sen-ai.fr/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        # ---------- Static client reports — fully isolated from Astro ----------
        # Files live on disk under /opt/sen-ai/reports/{client}/{period}/{slug}/
        # and are exposed via flat symlinks in /opt/sen-ai/reports/_serve/{slug}/.
        # The slug is the only public identifier; client/period stay private.
        location /r/ {
            alias /var/www/reports/_serve/;
            autoindex off;

            # Whitelist: only /r/{slug-12-alnum}/{name}.html is served.
            # Anything else (bare /r/, /r/{slug}/, other extensions) → 404.
            if ($request_uri !~ "^/r/[A-Za-z0-9]{12}/[A-Za-z0-9_.-]+\.html(\?.*)?$") {
                return 404;
            }

            try_files $uri =404;

            add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "no-referrer" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            # Short cache so unpublishes propagate within 5 minutes.
            add_header Cache-Control "private, max-age=300, must-revalidate" always;
            # No CSP here on purpose: reports embed Tailwind/Alpine via CDN.
        }
        # ---------- /Static client reports ----------

        # ---------- Hashed build assets - immutable ----------
        # Astro fingerprints every /_astro/* filename with a content hash :
        # a changed file gets a NEW url, so these can cache forever. The
        # node adapter's default max-age=14400 kept the Cloudflare edge
        # cache near 0% (Percent Cached 0.17% observed 2026-07-17) - with
        # a one-year immutable TTL Cloudflare serves them from the edge.
        location /_astro/ {
            proxy_pass http://astro:4321;
            proxy_set_header Host $host;
            proxy_hide_header Cache-Control;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }
        # ---------- /Hashed build assets ----------

        # API → FastAPI
        location /api/ {
            # Default nginx is 1 MB; bumped for /api/admin/reports/ HTML uploads.
            client_max_body_size 10m;
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Everything else → Astro (static + SSR)
        location / {
            proxy_pass http://astro:4321;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;

            # Replace the adapter's blanket max-age=0 with the allowlist
            # policy from the map above (marketing pages cacheable, app and
            # auth flows no-store). `always` so it applies to 301/404 too.
            proxy_hide_header Cache-Control;
            add_header Cache-Control $senai_cache_control always;
        }
    }
}
